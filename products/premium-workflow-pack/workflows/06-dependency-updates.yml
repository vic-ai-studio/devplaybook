# CUSTOMIZE: Adjust schedule and PR limits to fit your team's review capacity
# Creates one grouped PR per week for patch/minor updates
name: Automated Dependency Updates

on:
  schedule:
    # CUSTOMIZE: Monday mornings at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      update_type:
        description: 'Update type'
        type: choice
        options: [patch, minor, major]
        default: minor

jobs:
  update-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm-check-updates
        run: npm install -g npm-check-updates

      - name: Check for updates
        id: check
        run: |
          UPDATE_TYPE="${{ github.event.inputs.update_type || 'minor' }}"

          case $UPDATE_TYPE in
            patch) NCU_FLAGS="--target patch" ;;
            minor) NCU_FLAGS="--target minor" ;;
            major) NCU_FLAGS="--target latest" ;;
          esac

          # Dry run first — capture list of updates
          UPDATES=$(ncu $NCU_FLAGS 2>&1 || true)
          echo "$UPDATES"

          if echo "$UPDATES" | grep -q "All dependencies match"; then
            echo "has_updates=false" >> $GITHUB_OUTPUT
          else
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "update_type=$UPDATE_TYPE" >> $GITHUB_OUTPUT
          fi

      - name: Apply updates
        if: steps.check.outputs.has_updates == 'true'
        run: |
          UPDATE_TYPE="${{ steps.check.outputs.update_type }}"
          case $UPDATE_TYPE in
            patch) ncu -u --target patch ;;
            minor) ncu -u --target minor ;;
            major) ncu -u --target latest ;;
          esac
          npm install

      - name: Run tests after update
        if: steps.check.outputs.has_updates == 'true'
        run: npm test -- --passWithNoTests
        continue-on-error: true
        id: test_result

      - name: Create Pull Request
        if: steps.check.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): update ${{ steps.check.outputs.update_type }} dependencies'
          title: 'chore(deps): automated ${{ steps.check.outputs.update_type }} dependency updates'
          body: |
            ## Automated Dependency Updates

            **Update type:** `${{ steps.check.outputs.update_type }}`
            **Tests after update:** ${{ steps.test_result.outcome == 'success' && '✅ Passing' || '⚠️ Check required' }}

            Generated by [automated-dependency-updates workflow](.github/workflows/06-dependency-updates.yml)

            ### Review Checklist
            - [ ] Check for breaking changes in CHANGELOG files
            - [ ] Run full test suite locally
            - [ ] Review any major version bumps manually
          branch: chore/automated-dependency-updates
          delete-branch: true
          labels: dependencies,automated
