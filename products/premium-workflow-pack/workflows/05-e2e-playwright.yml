# CUSTOMIZE: Set your app URL and test shards count
# Uses Playwright with sharding for parallel E2E execution
name: E2E Tests (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  schedule:
    # CUSTOMIZE: Run E2E nightly at 02:00 UTC
    - cron: '0 2 * * *'

env:
  NODE_VERSION: '20'
  # CUSTOMIZE: Number of parallel shards (1 shard ≈ 2-3 min, 4 shards = ~1 min total)
  SHARD_COUNT: 4

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]  # CUSTOMIZE: Match SHARD_COUNT
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start app (if needed)
        run: |
          # CUSTOMIZE: Start your app or point to a deployed preview
          # npm run build && npm run preview &
          # npx wait-on http://localhost:4321
          echo "Using BASE_URL: ${{ vars.E2E_BASE_URL || 'http://localhost:3000' }}"

      - name: Run Playwright tests (shard ${{ matrix.shard }}/${{ env.SHARD_COUNT }})
        env:
          BASE_URL: ${{ vars.E2E_BASE_URL || 'http://localhost:3000' }}
          CI: true
        run: |
          npx playwright test \
            --shard=${{ matrix.shard }}/${{ env.SHARD_COUNT }} \
            --reporter=blob

      - name: Upload blob report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report
          retention-days: 7

  merge-reports:
    needs: e2e-test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML report
        run: |
          npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14

      - name: Check overall result
        run: |
          # Fail the workflow if any shard failed
          if [ "${{ needs.e2e-test.result }}" = "failure" ]; then
            echo "E2E tests failed — check the merged HTML report"
            exit 1
          fi
          echo "All E2E tests passed"
