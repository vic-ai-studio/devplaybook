# CUSTOMIZE: Set PROJECT_NAME to your Cloudflare Pages project name.
# Required secrets: CF_API_TOKEN, CF_ACCOUNT_ID
# Get CF_API_TOKEN: Cloudflare Dashboard → My Profile → API Tokens → Create Token
#   Use template: "Edit Cloudflare Workers" and scope to your account
name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # CUSTOMIZE: Add your build-time env vars here
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          # CUSTOMIZE: Replace with your Cloudflare Pages project name
          projectName: my-project
          # CUSTOMIZE: Change to your build output directory (dist, out, build, etc.)
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # Shows deployment URLs in PR comments
          wranglerVersion: "3"
