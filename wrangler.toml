name = "devplaybook"
compatibility_date = "2024-09-23"
pages_build_output_dir = "./dist"

# KV namespace for dev setup submissions
[[kv_namespaces]]
binding = "DEV_SETUPS"
id = "e3a170ada7f24614aeda02f05d65321a"
preview_id = "e3a170ada7f24614aeda02f05d65321a"

# KV namespace for Pro subscribers (created by Stripe webhook)
[[kv_namespaces]]
binding = "SUBSCRIBERS"
id = "0526f357f31840868ddf9205e4a5c926"
preview_id = "0526f357f31840868ddf9205e4a5c926"

# KV namespace for analytics (pageviews + web vitals)
# Setup: Cloudflare Dashboard > Workers & Pages > KV > Create namespace "devplaybook-analytics"
# Then replace REPLACE_WITH_* below with the real namespace IDs
[[kv_namespaces]]
binding = "ANALYTICS"
id = "30ee9f01d8eb4faf9120398ccb3dc70c"
preview_id = "3c66e7864e9f449dbfadf107a5226509"

# KV namespace for newsletter email subscribers
[[kv_namespaces]]
binding = "NEWSLETTER_KV"
id = "1ca6a0dc6080480da7c8bc70298dd5f9"
preview_id = "1ca6a0dc6080480da7c8bc70298dd5f9"

# Cloudflare Web Analytics token (set as Pages env var PUBLIC_CF_ANALYTICS_TOKEN)
# Get token from: Cloudflare Dashboard > Analytics & Logs > Web Analytics > Add site
# Then set PUBLIC_CF_ANALYTICS_TOKEN in Pages > Settings > Environment Variables

# KV namespace for auth tokens and sessions (magic link + session store)
# Setup: Cloudflare Dashboard > Workers & Pages > KV > Create namespace "devplaybook-auth"
# Then run: wrangler kv:namespace create AUTH_KV --preview
[[kv_namespaces]]
binding = "AUTH_KV"
id = "63038dc567194c5d84cf66a0cf0ed918"
preview_id = "bc562634b1c845929e5309f7e770eedc"

# Stripe environment variables (set as secrets via Cloudflare Pages dashboard)
# wrangler pages secret put STRIPE_SECRET_KEY
# wrangler pages secret put STRIPE_PUBLISHABLE_KEY
# wrangler pages secret put STRIPE_WEBHOOK_SECRET
# wrangler pages secret put RESEND_API_KEY
#
# For local dev, set these in .dev.vars (never commit that file)
