<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraphQL Playground</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-pink-400">GraphQL Playground</h1>
        <div class="grid md:grid-cols-2 gap-8">
            <div>
                <label class="block mb-2 text-gray-400">GraphQL Endpoint</label>
                <input type="text" id="endpoint" value="https://countries.trevorblades.com/graphql" class="w-full p-3 bg-gray-800 rounded mb-4">
                <label class="block mb-2 text-gray-400">GraphQL Query</label>
                <textarea id="query" rows="10" class="w-full p-3 bg-gray-800 rounded font-mono text-sm">query {
  countries {
    code
    name
    capital
  }
}</textarea>
                <button onclick="executeQuery()" class="mt-4 w-full bg-pink-600 hover:bg-pink-700 p-3 rounded font-bold">執行查詢</button>
            </div>
            <div>
                <label class="block mb-2 text-gray-400">結果 (JSON)</label>
                <pre id="result" class="bg-gray-800 p-4 rounded h-[300px] overflow-auto"></pre>
                <label class="block mt-4 mb-2 text-gray-400">狀態</label>
                <div id="status" class="bg-gray-800 p-3 rounded text-yellow-400">等待執行...</div>
            </div>
        </div>
        <div class="mt-8">
            <h2 class="text-xl font-bold mb-4 text-cyan-400">範例 Query</h2>
            <div class="grid md:grid-cols-2 gap-4">
                <button onclick="setQuery('{ countries { code name } }')" class="bg-gray-800 p-3 rounded hover:bg-gray-700 text-left">各國基本資訊</button>
                <button onclick="setQuery('{ continent(code: "AS") { name countries { name capital } } }')" class="bg-gray-800 p-3 rounded hover:bg-gray-700 text-left">亞洲國家</button>
                <button onclick="setQuery('{ language(code: "zh") { name native } }')" class="bg-gray-800 p-3 rounded hover:bg-gray-700 text-left">中文資訊</button>
            </div>
        </div>
    </div>
    <script>
        async function executeQuery() {
            const endpoint = document.getElementById('endpoint').value;
            const query = document.getElementById('query').value;
            const statusEl = document.getElementById('status');
            const resultEl = document.getElementById('result');
            
            statusEl.textContent = '執行中...';
            statusEl.className = 'bg-gray-800 p-3 rounded text-blue-400';
            
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                const data = await response.json();
                resultEl.textContent = JSON.stringify(data, null, 2);
                statusEl.textContent = `成功 (${response.status})`;
                statusEl.className = 'bg-gray-800 p-3 rounded text-green-400';
            } catch (error) {
                resultEl.textContent = JSON.stringify({ errors: [{ message: error.message }] }, null, 2);
                statusEl.textContent = '錯誤: ' + error.message;
                statusEl.className = 'bg-gray-800 p-3 rounded text-red-400';
            }
        }
        function setQuery(q) {
            document.getElementById('query').value = q;
        }
    </script>
</body>
</html>
