<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 寫作助手工具 - DevPlaybook</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; background: linear-gradient(90deg, #00d9ff, #00ff88); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { font-size: 1.2em; color: #aaa; }
        .card { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 30px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .card h2 { color: #00d9ff; margin-bottom: 15px; font-size: 1.5em; }
        .card p { color: #ccc; line-height: 1.8; }
        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin: 30px 0; }
        .feature { background: rgba(0,217,255,0.1); padding: 20px; border-radius: 12px; text-align: center; }
        .feature-icon { font-size: 2em; margin-bottom: 10px; }
        .feature h3 { color: #00ff88; margin-bottom: 8px; }
        .btn { display: inline-block; background: linear-gradient(90deg, #00d9ff, #00ff88); color: #1a1a2e; padding: 15px 40px; border-radius: 30px; text-decoration: none; font-weight: bold; font-size: 1.1em; transition: transform 0.3s; }
        .btn:hover { transform: scale(1.05); }
        .meta { text-align: center; color: #666; margin-top: 40px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI 寫作助手</h1>
            <p>智慧寫作工具，提升您的內容創作效率</p>
        </div>
        <div class="card">
            <h2>工具介紹</h2>
            <p>AI 寫作助手是一款基於先進自然語言處理技術的智能寫作工具。它能夠幫助用戶快速生成高質量的文章、部落格文章、行銷文案等內容，大幅提升寫作效率。</p>
        </div>
        <div class="features">
            <div class="feature">
                <div class="feature-icon">✍️</div>
                <h3>智能生成</h3>
                <p>AI 自動生成各類型文章內容</p>
            </div>
            <div class="feature">
                <div class="feature-icon">🔍</div>
                <h3>語法檢查</h3>
                <p>即時檢查並修正語法錯誤</p>
            </div>
            <div class="feature">
                <div class="feature-icon">💡</div>
                <h3>創意建議</h3>
                <p>提供多元的創意寫作方向</p>
            </div>
            <div class="feature">
                <div class="feature-icon">🌐</div>
                <h3>多語言支援</h3>
                <p>支援中文、英文等多語言</p>
            </div>
        </div>
        <div class="card">
            <h2>使用場景</h2>
            <p>適用於部落客、內容行銷人員、學生、研究者等需要大量文字創作的群體。</p>
            <br>
            <a href="#" class="btn">開始使用</a>
        </div>
        <div class="meta">
            <p>最後更新: 2026-03-27</p>
        </div>
    </div>
</body>
</html>
