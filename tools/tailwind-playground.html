<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Playground - 即時預覽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/monaco-editor@latest/min/vs/loader.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="flex h-screen">
        <div class="w-1/2 p-4 border-r border-gray-700">
            <h1 class="text-2xl font-bold mb-4 text-purple-400">Tailwind Playground</h1>
            <textarea id="htmlInput" class="w-full h-[70vh] bg-gray-800 p-4 rounded font-mono text-sm" placeholder="輸入 HTML..."><div class="p-8">
  <h1 class="text-4xl font-bold text-center mb-4 text-purple-400">Hello Tailwind!</h1>
  <p class="text-gray-300 text-center">開始編輯右側的 HTML 來看看效果</p>
  <div class="mt-8 grid grid-cols-3 gap-4">
    <div class="bg-blue-500 p-4 rounded-lg">Card 1</div>
    <div class="bg-green-500 p-4 rounded-lg">Card 2</div>
    <div class="bg-red-500 p-4 rounded-lg">Card 3</div>
  </div>
</div></textarea>
            <button onclick="updatePreview()" class="mt-4 w-full bg-purple-600 hover:bg-purple-700 p-3 rounded font-bold">更新預覽</button>
        </div>
        <div class="w-1/2 p-4 bg-gray-800">
            <h2 class="text-xl font-bold mb-4 text-green-400">即時預覽</h2>
            <iframe id="preview" class="w-full h-[85vh] bg-white rounded"></iframe>
        </div>
    </div>
    <script>
        function updatePreview() {
            const html = document.getElementById('htmlInput').value;
            const iframe = document.getElementById('preview');
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            doc.open();
            doc.write(`<!DOCTYPE html><html><head><script src="https://cdn.tailwindcss.com"><\/script></head><body>${html}</body></html>`);
            doc.close();
        }
        updatePreview();
        document.getElementById('htmlInput').addEventListener('input', updatePreview);
    </script>
</body>
</html>
