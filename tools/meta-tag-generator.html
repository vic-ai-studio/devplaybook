<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Tag Generator - SEO 工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-cyan-400">Meta Tag Generator</h1>
        <div class="grid md:grid-cols-2 gap-8">
            <div class="space-y-4">
                <input type="text" id="title" placeholder="標題 (Title)" class="w-full p-3 bg-gray-800 rounded">
                <input type="text" id="description" placeholder="描述 (Description)" class="w-full p-3 bg-gray-800 rounded">
                <input type="text" id="keywords" placeholder="關鍵字 (Keywords)" class="w-full p-3 bg-gray-800 rounded">
                <input type="text" id="ogTitle" placeholder="OG Title" class="w-full p-3 bg-gray-800 rounded">
                <textarea id="ogDescription" placeholder="OG Description" rows="3" class="w-full p-3 bg-gray-800 rounded"></textarea>
                <input type="text" id="canonical" placeholder="Canonical URL" class="w-full p-3 bg-gray-800 rounded">
                <button onclick="generateTags()" class="w-full bg-cyan-600 hover:bg-cyan-700 p-3 rounded font-bold">產生 Meta Tags</button>
            </div>
            <div>
                <h2 class="text-xl font-bold mb-4 text-green-400">產生的程式碼</h2>
                <pre id="output" class="bg-gray-800 p-4 rounded overflow-x-auto"></pre>
                <button onclick="copyToClipboard()" class="mt-4 w-full bg-green-600 hover:bg-green-700 p-3 rounded font-bold">複製到剪貼簿</button>
            </div>
        </div>
    </div>
    <script>
        function generateTags() {
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const keywords = document.getElementById('keywords').value;
            const ogTitle = document.getElementById('ogTitle').value || title;
            const ogDescription = document.getElementById('ogDescription').value || description;
            const canonical = document.getElementById('canonical').value;
            
            const tags = `<title>${title}</title>
<meta name="description" content="${description}">
<meta name="keywords" content="${keywords}">
<meta property="og:title" content="${ogTitle}">
<meta property="og:description" content="${ogDescription}">
<meta property="og:type" content="website">
<link rel="canonical" href="${canonical}">`;
            
            document.getElementById('output').textContent = tags;
        }
        function copyToClipboard() {
            const text = document.getElementById('output').textContent;
            navigator.clipboard.writeText(text).then(() => alert('已複製!'));
        }
    </script>
</body>
</html>
