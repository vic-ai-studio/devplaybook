<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- Accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)" />
  <!-- Grid dots pattern -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#6366f1"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>
  <!-- Icon -->
  <text x="100" y="260" font-size="80" font-family="system-ui, sans-serif">🛠️</text>
  <!-- Main title -->
  <text x="100" y="340" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="62" fill="#f8fafc">Free Developer Tools</text>
  <!-- Subtitle -->
  <text x="100" y="410" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="30" fill="#94a3b8">API builder · Regex · JSON · Git · Docker · and more</text>
  <!-- Badge -->
  <rect x="100" y="450" width="230" height="46" rx="23" fill="#6366f1" opacity="0.15"/>
  <rect x="100" y="450" width="230" height="46" rx="23" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <text x="215" y="480" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="18" fill="#818cf8" text-anchor="middle">devplaybook.cc</text>
  <!-- Right decorative code block -->
  <rect x="720" y="120" width="380" height="340" rx="12" fill="#0f172a" opacity="0.8" stroke="#475569" stroke-width="1.5"/>
  <circle cx="754" cy="152" r="8" fill="#ef4444"/>
  <circle cx="780" cy="152" r="8" fill="#f59e0b"/>
  <circle cx="806" cy="152" r="8" fill="#10b981"/>
  <text x="748" y="200" font-family="monospace, Courier New" font-size="15" fill="#6366f1">const</text>
  <text x="810" y="200" font-family="monospace, Courier New" font-size="15" fill="#f8fafc">tool =</text>
  <text x="748" y="228" font-family="monospace, Courier New" font-size="15" fill="#f8fafc">  fetch(</text>
  <text x="748" y="256" font-family="monospace, Courier New" font-size="15" fill="#10b981">  '/api/tools'</text>
  <text x="748" y="284" font-family="monospace, Courier New" font-size="15" fill="#f8fafc">);</text>
  <text x="748" y="330" font-family="monospace, Courier New" font-size="15" fill="#94a3b8">// 50+ free tools</text>
  <text x="748" y="358" font-family="monospace, Courier New" font-size="15" fill="#94a3b8">// no signup needed</text>
  <text x="748" y="386" font-family="monospace, Courier New" font-size="15" fill="#94a3b8">// runs in browser</text>
  <text x="748" y="430" font-family="monospace, Courier New" font-size="14" fill="#818cf8">▋</text>
</svg>
