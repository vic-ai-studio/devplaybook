<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0c4a6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Grid pattern overlay -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)" />

  <!-- Logo mark -->
  <rect x="80" y="80" width="56" height="56" rx="12" fill="url(#accent)" opacity="0.9"/>
  <text x="108" y="120" font-family="monospace" font-size="32" font-weight="bold" fill="white" text-anchor="middle">&gt;_</text>

  <!-- Brand name -->
  <text x="152" y="122" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700" fill="#38bdf8">DevPlaybook</text>

  <!-- Main headline -->
  <text x="80" y="280" font-family="'Segoe UI', Arial, sans-serif" font-size="64" font-weight="800" fill="white">Free Developer</text>
  <text x="80" y="360" font-family="'Segoe UI', Arial, sans-serif" font-size="64" font-weight="800" fill="url(#accent)">Tools &amp; Resources</text>

  <!-- Tagline -->
  <text x="80" y="430" font-family="'Segoe UI', Arial, sans-serif" font-size="26" fill="#94a3b8">Interactive tools · Boilerplates · Guides for developers</text>

  <!-- Pills -->
  <rect x="80" y="480" width="160" height="40" rx="20" fill="#0ea5e9" opacity="0.2"/>
  <text x="160" y="506" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#38bdf8" text-anchor="middle">🔧 33+ Tools</text>

  <rect x="256" y="480" width="170" height="40" rx="20" fill="#0ea5e9" opacity="0.2"/>
  <text x="341" y="506" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#38bdf8" text-anchor="middle">📦 Products</text>

  <rect x="442" y="480" width="160" height="40" rx="20" fill="#0ea5e9" opacity="0.2"/>
  <text x="522" y="506" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#38bdf8" text-anchor="middle">📝 Articles</text>

  <!-- URL -->
  <text x="1120" y="590" font-family="monospace" font-size="20" fill="#64748b" text-anchor="end">devplaybook.cc</text>

  <!-- Decorative circles -->
  <circle cx="1100" cy="200" r="200" fill="#0ea5e9" opacity="0.05"/>
  <circle cx="1150" cy="400" r="120" fill="#38bdf8" opacity="0.04"/>
</svg>
