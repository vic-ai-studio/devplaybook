<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="200" fill="#6366f1" opacity="0.07"/>
  <circle cx="150" cy="530" r="150" fill="#8b5cf6" opacity="0.05"/>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>
  <!-- Brand label -->
  <text x="80" y="80" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#6366f1" font-weight="600" letter-spacing="2">DEVPLAYBOOK</text>
  <!-- Tool name -->
  <text x="80" y="290" font-family="system-ui,-apple-system,sans-serif" font-size="60" fill="#f1f5f9" font-weight="700" letter-spacing="-1">QR Code Generator</text>
  <!-- Description -->
  <text x="80" y="355" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#94a3b8" font-weight="400">Generate QR codes for URLs & text</text>
  <!-- Free badge -->
  <rect x="80" y="405" width="120" height="40" rx="8" fill="#6366f1" opacity="0.2"/>
  <rect x="80" y="405" width="120" height="40" rx="8" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <text x="140" y="431" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#a5b4fc" font-weight="600" text-anchor="middle">FREE TOOL</text>
  <!-- URL -->
  <text x="80" y="590" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#475569">devplaybook.cc/tools/qr-code-generator</text>
</svg>