name: CI — Build Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx astro check

      - name: Build (Astro)
        id: build
        run: |
          # Skip OG image generation in CI (requires canvas/fonts)
          npx astro build
          echo "BUILD_STATUS=success" >> $GITHUB_OUTPUT

      - name: Collect build size stats
        id: stats
        run: |
          DIST_SIZE=$(du -sh dist/ | cut -f1)
          PAGE_COUNT=$(find dist/ -name "*.html" | wc -l | tr -d ' ')
          JS_SIZE=$(find dist/_astro/ -name "*.js" 2>/dev/null | xargs du -ch 2>/dev/null | tail -1 | cut -f1 || echo "0")
          CSS_SIZE=$(find dist/_astro/ -name "*.css" 2>/dev/null | xargs du -ch 2>/dev/null | tail -1 | cut -f1 || echo "0")
          echo "DIST_SIZE=$DIST_SIZE" >> $GITHUB_OUTPUT
          echo "PAGE_COUNT=$PAGE_COUNT" >> $GITHUB_OUTPUT
          echo "JS_SIZE=$JS_SIZE" >> $GITHUB_OUTPUT
          echo "CSS_SIZE=$CSS_SIZE" >> $GITHUB_OUTPUT

      - name: Check for broken internal links
        run: |
          npm install -g @nicolo-ribaudo/linkinator 2>/dev/null || npm install -g linkinator
          linkinator dist/ --recurse --skip "^https?://" --format csv 2>/dev/null | grep -v "^OK" | grep -v "^URL" > broken-links.txt || true
          if [ -s broken-links.txt ]; then
            echo "⚠️ Broken internal links found:"
            cat broken-links.txt
          else
            echo "✅ No broken internal links"
          fi

      - name: Post build summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const distSize = '${{ steps.stats.outputs.DIST_SIZE }}';
            const pageCount = '${{ steps.stats.outputs.PAGE_COUNT }}';
            const jsSize = '${{ steps.stats.outputs.JS_SIZE }}';
            const cssSize = '${{ steps.stats.outputs.CSS_SIZE }}';

            let brokenLinks = '';
            try {
              const fs = require('fs');
              const content = fs.readFileSync('broken-links.txt', 'utf8').trim();
              brokenLinks = content ? `\n\n⚠️ **Broken links detected:**\n\`\`\`\n${content}\n\`\`\`` : '';
            } catch {}

            const body = `## 🏗️ Build Summary

            | Metric | Value |
            |--------|-------|
            | 📄 Total pages | ${pageCount} |
            | 📦 Dist size | ${distSize} |
            | ⚡ JS bundle | ${jsSize} |
            | 🎨 CSS bundle | ${cssSize} |

            ✅ Build passed successfully${brokenLinks}

            *Generated by [CI workflow](${context.payload.repository.html_url}/actions/runs/${context.runId})*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
